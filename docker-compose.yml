version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pedidos-postgres
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops123
      POSTGRES_DB: pedidos_veloz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: pedidos-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  api-gateway:
    build: ./services/api-gateway
    container_name: pedidos-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - pedidos
      - pagamentos
      - estoque

  pedidos:
    build: ./services/pedidos
    container_name: pedidos-service
    environment:
      DB_HOST: postgres
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  pagamentos:
    build: ./services/pagamentos
    container_name: pagamentos-service
    depends_on:
      - pedidos

  estoque:
    build: ./services/estoque
    container_name: estoque-service
    depends_on:
      - pedidos

volumes:
  postgres_data:
