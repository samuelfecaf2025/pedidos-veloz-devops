name: CI/CD - Pedidos Veloz

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, pedidos, pagamentos, estoque]

    steps:
      - uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: samuelfecaf2025/pedidos-veloz-${{ matrix.service }}:latest, samuelfecaf2025/pedidos-veloz-${{ matrix.service }}:${{ github.sha }}

  deploy-kubernetes:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy no Kubernetes
        uses: azure/k8s-deploy@v4
        with:
          manifests: |
            k8s/deployment.yaml
            k8s/service.yaml
            k8s/hpa.yaml
            k8s/blue-green-service.yaml
          namespace: default
          # Se quiser usar kubeconfig, adicione o secret depois
